name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eshop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastav Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instaluj závislosti
        run: pip install -r requirements.txt

      - name: Spusť testy
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: eshop_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: pytest test_db.py -v --cov=. --cov-report=term-missing
